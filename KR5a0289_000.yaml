body:
  text: 天台白雲子述導引論天肢體關節本資於動用經脉榮衛在於宣通今既間居乃無運役事須導引以致和暢户樞不蠹其義信然人之血氣精神者所以養生而周其性命也脉經者所以行血氣也故榮氣者所以通津血益筋骨利關隔也衛氣者所以溫肌肉充皮膚肥腠理司開闔也又浮氣之修於經者為衛氣其精氣之行於經者為榮氣陰陽相隨內外相貫如環之無端也又頭者精明之府背者胸之府腰者腎之府膝者筋之府髓者骨之府而又諸骨皆屬於目諸髓皆屬於腦諸筋皆屬於節諸血皆屬於心諸氣皆屬於肺此四肢八環之朝夕也是知五勞之損動靜所久五禽之導搖動其關然人之形體上下相承氣之源流升降有叙嘗見諸導引文多無次第今所法者實有宗旨其五體平和者依常數為之苦一處有所偏疾者則於其處加數用力行之凡導引當以丑後卯前天氣清和時為之先解髮散梳四際上達頂三百六十五過散髮於後或寬作髻亦得燒香面向東平坐握固閉目思神叩齒三百六十五過乃縱體平氣依次為之先閉氣以兩手五指交叉反掌向前極引臂拒托之良久即舉手反掌向上極臂即低左手力舉右肘令左肘臂按著後項左手向下力牽之仍亞向左開右腋努脅為之低右舉左亦如之即低手鈎項舉兩肘偃胸仰頭向後令頭與手前後競力為之即低手鈎項擺肘捩身向左向右即放手兩膝上微吐氣通息又從初為之三度次覆伸左手仰掌竪指屈右手舉肘仰掌竪指開臂胸膊如挽弓之勢仍回頭向左使頭項胸臆臂肘等用力為之左右各三度次兩手作拳拿臂向前築即努肘向後蹙急做勢用力為之前後各三度次以左手拳向左之後力擺臂三又向下擺臂三右如之次交兩臂於胸前各以手指攀兩肩仰頭偃胸努腹腰為之即低頭曲腰聳肩兩手向下用力攀之一仰一低各三度次屈兩手腕安腋下促兩肘向前低頭努背為之即仰頭努胸臆促兩肘向後為之前後各三度次帖膝坐以兩手托腰向前偃身向後競力為之仍搖動其身即平坐縱緩又為之三度次交脛平坐左手托左邊牀稍近身後回腕向外指裏以右手攀左膝回頭向左仰視其後努左右臂膊用力為之左右各三度次竪兩膝交兩脛以兩手交指反掌向外抱膝仍低頭努腰背開膝以磔而臂極膝訖即回手掌向裏急抱膝聳身仰面申咽臆力向後為之一仰一低各三度次交脛平坐從膝向裏申脛出外以手捉腳指聳肩向上用力攀仍努腰腹向前左右搖之氣極放寬又為之三度次以左手攀左腳指至腳心腳指至手腕漸長舒腳仍舉踵向上却將右手托右膝上仍轉頭向左右競力為之即屈左腳以兩手共捧其跟向上高舉之即放下以左手按膝右手攀腳左手向下極按右手回向上極攀之回頭向右之後努肩膊為之左右三度次長舒兩腳偃身向後反手托牀屈右腳向前作勢掣踏之左右三度次舒右腳屈左腳以踵加右髀上垂左膝向下令至牀即舒左屈右為之左右各三度次偃身反托牀竪左膝促斂其踵至臀邊舉右踵鈎取左膝漸向下按之令左膝頭至牀左右各三度次屈左腳向外以左手下攀腳腕右手托右膝回頭向右低左膝著牀以腳向外展以手向內攀競力為之左右各三度次開兩膝合兩腳踵以兩手攀腳掌仰頭向上力舉之氣極縱體為之三度次舒腳以兩手交指鈎曲䐐中偃身向後力鈎之仍漸高舉腳努脛偃指左右各三度次長舒兩腳令並竪指以兩手各攀其指舉頭用力為之三度導引畢平坐縱體摩兩手掌令溫乘額向上三九過摩掌後拭目三九過即以兩手中指無名指按鼻左右上下二七過摩之以食指中指叉耳向上聳之三五過便以虎口叉耳向後修旋耳輪三五過摩掌令熱摩拭面上令溫溫然摩頸項胸臆兩乳數十過即摩持臂上至肩下至手背上下數十過即兩手互相搦捩回轉之如洗手狀急用力為之數十過即摩按心腹腰髀等處都畢待氣息調平坐服氣如法其摩掌乘額拭面目等尋常數數為之彌佳不唯在服氣之時其諸導引亦不可總為諸法恐煩勞任逐便為之然終須從首至足令相承取通也亦可隔三五日一度具導引之又有立卧等法不能多述亦各任意為之符水論夫符文者雲篆明章神靈之書字也點畫有所象故神氣存焉文字有所生故服用朱焉夫水者元氣之津潜陽之潤也有形之類莫不資焉故水為氣母水潔則氣清氣為形本氣和則形泰雖身之榮衛自有內液而腹之臟腑亦假外滋既可以通腹胃益津氣又可以導符靈助祝術今撰諸符水之法以備所用可按而為之焉右符每以向月建以滿日燒香丹書紙左手持水器右手持符可以水一升吞之多少任意如得井華水為良縱是泉水亦可旦取之祝曰金木水火土五星之氣六甲之精三真天食濁氣常盈黃父赤子守中無傾三祝之皆一氣畢三叩齒三琢齒以所執符噀水仍於水上燒符灰納水中勿令散失也北向再拜服之己後條件各别是一法也前符每以甲子日丹書八枚至滿日平旦取井華水以日出時再拜自稱云請服符章願令神氣充滿服二枚次於平定執日亦各服二枚餘五甲亦可更書服之耳右六甲陰陽符各隨其日支干書內方中也陽符下有甲子陰符下有乙丑字此舉甲子乙丑為例耳其丙寅丁卯等日各以其日支干書之皆不悟此理即其文曰各隨其日支干書方中亦由六甲都匠回符中書其日支干書也仍以朱書陽符黑書陰符亦可預書一旬之符至其旦取服之每平旦東向燒香左手持符右手持水器取井華水任服多少祝曰真人某乙好樂真道服食中和之氣甲子太玄玉女承翼竟一旬同呼此他甲放此紿侍某甲行厨所在當得無令飢渴本文兼云丹無大小人無多少皆當得飽今既自服故不用此言又或日不可減損祝詞則日日無早晚身無晝夜皆得飽畢再拜以符納口中飲水送之甲子旬中太玄玉女承翼甲戌旬黃素玉女非廉甲申旬太素玉女瓊石甲午旬絳宫玉女雲齡甲辰旬拜精玉女靈素甲寅旬青腰玉女惠精右二符每以滿日丹書吞服之道士張子登所服也右符每以滿日丹書吞之道士陳叔平所服不食己五年右符每以滿日丹書吞之道士許廣所服右安期先生絶穀符丹書絳三寸封以小筒繫右臂令人不飢强身符下三符是也服水絶穀法每旦取井華水以器中盛之仍常别用一好器其水皆有濁淀久服不佳宜預早取停澄良久乃取清者服之向王燒香左手持水器右手持物既不名其物即是物皆得然可取青竹子一節上下全者常充叩用耳祝曰承掾史之賜神人之糧正赤黃行無過域下諸醫以自防畢叩齒三通咽氣三下令齒氣齊鳴凡三祝止飲之多少任意以飽為度此旦一服後飢即取水祝服之亦無論早晚日三服便不飢初服水數十日瘦極頭眩足弱過此漸佳若兼服藥物則不至虛惙也不欲多言笑舉動忘精費氣此為所忌耳服藥論夫五藏通榮衛之氣六府資水穀之味今既服氣則藏氣之有餘又既絶穀則府味之不足素問曰穀不入半日則氣衰一日則氣少故須諸藥以代於穀使氣兼致藏府而全也清陽為天濁陰為地清陽出上竅濁陰出下竅清陽發腠理濁陰走五藏清陽實四肢濁陰歸六府清陽為氣濁陰為味味歸形形歸氣氣歸精精食氣形食味氣為陽味為陰陰勝則陽病陽勝則陰病是知陰以通之味以實之通之則不憊實之則不羸矣今以草木之藥性味於藏府所宜為也安藏丸理氣膏其先無病疹藏府平和者可常服此丸膏並茯苓巨勝等單服之藥若藏有病者則以所宜者增損之服如先有痼疾及别得餘患者當别醫攻療則非此之所愈也其上清方藥各依本經禀受者自宜遵服安和藏府丸方茯苓桂心甘草炙人參柏子仁薯蕷麥門冬去心己上各三兩天門冬四兩右搗篩為散白蜜和為丸丸如梧桐子每服三十丸日再服以藥飲下之松葉枸杞等諸藥可為飲也理潤氣液膏方天門冬黃精地黃术己上各五升各煎訖相和勻茯苓二兩桂心甘草炙已上各三兩薯蕷澤瀉己上各五兩右並搗以密絹篩令極細納諸煎中又納熟巨勝杏仁屑三升白蜜二升攪令調重湯煮攪勿住手令如膏便調强為佳冷凝搗數千杵密器貯固之少出丸服每早晨以一丸如李核大含消咽之日再三此藥宜八月九月合至三月已來服之若三月二月中更煮一度令稠硬則經夏不復壞吐陰痰飲方甘草二兩生用茯苓二兩煮茶汁可五六升許濃汁者切前藥相和煮取六升絞去滓微溫服三升令頓即以物剔喉中令吐吐已又溫服三升别令極畫所吐當引痰涎出矣又煮單茶汁三升許加少許生薑橘皮稍熱服漸漸啜之便仰卧以手挼摩胸臆下至心腹暖覆衣便卧良久自此後勿食酸鹹諸物瀉陰宿澤方大黃白术赤茯苓生薑己上各二兩大檳榔三枚去皮切碎水浸文火煮過别篩為末吳茱萸甘草炙枳殼炙已上各一兩右切以水五升煮取二升湯欲成納大黃煮一沸絞去滓分溫再服納檳榔末一半如人行五六里又服以得三四行快瀉為度初一服若不覺轉利後服亦可加煉成朴硝半兩服之自此後勿食生冷堅硬滑諸物十餘日將息平和訖然可服氣餌藥凡吐瀉皆以月三日後十五日已前天氣晴和為佳其日風雨陰霧及十五日己後愼不得吐瀉愼忌論夫氣之為理也納而難固吐而易竭難固須保而使全易竭須惜而勿泄真人曰學道常如憶朝餐未有得之者惜氣常如惜面皮未有不全者也又曰若使惜氣常如一身之先急吾少見於枯悴矣其於交接言笑務宜省約運動呼叫特須調緩觸類愛愼方免所損矣夫人之為性也與天地合體陰陽混氣皮膚骨髓藏府榮衛呼吸進退寒暑變異莫不均乎二儀應乎五行也是知天地否泰陰陽亂焉藏府不調經脉之候病焉因外所中者百病起於風也因內所致者百病生於氣也故曰恬惔虛寂真氣居之精神內守病安從來信哉是言也故須知形神之性養而全之內外之疾畏而愼之素問曰天有宿度地有經水人有經脉天地和則經水安靜寒則經水凝沍暑則經水沸溢風暴起則經水波涌而隴起或虛邪因而入客亦猶經水之得風也天溫日明則人血氣淖液而衛氣揚天寒日陰則人血亦疑沍而衛氣沉血氣者喜溫而惡寒寒則沍而不流溫喜而去之蒼天之氣清靜則志意治從則陽氣固賊邪不能容此因時之孕也月始生則人血氣始精衛氣始行月郭滿則血氣實肌肉堅月郭空則肌肉減經絡虛衛氣去形獨居是以因天時而調血氣者也若此時犯冒虛邪則以身之虛而逢天之虛兩虛相感其起至骨入則傷五藏故曰天忌不可不知也八正者所以候八風虛邪以時至者也八正之虛邪避之如矢射愼勿犯者假令冬至之月風從南來為風賊傷也謂從其虛邪之鄉來乃能病人也他節仿此陽氣者一日而三候平旦陽氣生日中陽氣隆日西陽氣己虛氣門乃閉是故暮而收拒無擾筋骨無見霧露反此三時形乃困薄久視傷血久卧傷氣久立傷骨久行傷筯久坐傷肉是謂五勞所傷也愁憂思慮則傷心形寒飲冷則傷肺恚怒氣逆上而不下則傷肝飲食勞倦則傷脾久坐濕地强力入水則傷腎人有五氣喜怒悲憂恐也怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣聚熱則氣泄憂則氣亂勞則氣耗思則氣結喜怒傷陰寒暑傷陽喜怒不節寒暑過度生乃不固五味所入苦入心辛入肺酸入肝甘入脾鹹入腎陰之生本在五味是故味過於酸則肝氣以津肺氣乃絶味過於鹹則骨氣勞短肺氣折味過於甘則心氣喘滿色黑腎不衡味過於苦則脾氣不濡胃氣乃厚味過於辛則筋脉阻弛精神乃央是故謹和五味則骨正筯柔氣血以流腠理以密如是則氣骨以精謹道如法長有天命多食鹹則脉凝沍而變色多食苦則皮槁而毛拔多食辛則筋急而爪枯多食酸則肉胝𦛴而唇揭多食甘則骨痛而髮落此五味之所傷也此論飲食之五味而藥性亦有五味服餌丸散特宜愼之服氣之人不宜食辛味何者辛走氣氣病無食辛也五藏論夫生之成形也必資之於五藏形或有廢而藏不可闕神之為性也必稟於五藏性或有異而氣不可虧是天有五星進退成其經緯地有五嶽靜鎮安其方位氣有五行渾化弘其埏埴人有五藏生飬處其精神故乃心藏神肺藏氣肝藏血脾藏肉腎藏志志意通內連骨髓而成身形矣又心者生之本神之處也肺者氣之本魄之處也肝者罷極之本魂之處也脾者食廩之本營之處也腎者封藏之本精之處也至於九竅施為四肢動用骨肉堅實經脉宣行莫不禀源於五藏分流於百體順寒暑以延和保精氣以享壽且心為諸藏之主主明則運用宣通有心之子安可不悟其神之理邪藏有要害不可不察肝生於左肺生於右心部於表腎位於裏脾為之使胃為之市心為之汗肺為之涕肝為之泪脾為之涎腎為之唾是謂五液心為噫肺為咳肝為語脾為笑腎為嚏天氣通於肺地氣通於肝雷氣通於心穀氣通於脾雨氣通於腎五藏各有所合心之合脉也其榮色也肺之合皮也其榮毛也肝之合筋也其榮爪也脾之合肉也其榮脣也腎之合骨也其榮髮也五藏各有府藏為陽府為陰五藏者藏精神而不瀉也故滿而不能實六府者受水穀而不留故實而能滿夫小腸為心之府大腸為肺之府膽為肝之府胃為脾之府膀胱為腎之府六府者各有其應小腸者脉其應也大腸者皮其應也膽者筋其應也胃者肉其應也三焦膀胱者腠理毫毛其應也十二藏之相使者心者君主之官也神明出焉肺者相傅之官也治節出焉肝者將軍之官也謀慮出焉膽者中正之官也决斷出焉膻中者臣使之官也喜樂出焉胸中上焦之門户也脾胃者倉廩之官也五味出焉大腸者傳道之官也變化出焉小腸者受盛之官也化物出焉腎者作强之官也伎巧出焉三焦者决瀆之官也水道出焉膀胱者州郡之官也津液藏焉氣化則能出矣凡此十二官不得相失也故主明則下安以此飬生則壽沒世不殆主不明則十二官危使道閉塞而不通形乃大傷以此養生則殆也療病論夫氣者之為功也廣矣妙矣故天氣下降則寒暑有四時之變地氣上騰則風雲有八方之異兼二儀而為一體者總形氣於其人是能存之為家則神靈儼然用之能禁則功效著矣况以我之心使我之氣適我之體攻我之疾何往而不愈哉習服間居則易為存使諸有疾痛皆可按而療之凡欲療疾皆可以日出後天氣和靜面向日在室中亦向日存為之平坐臨目握固叩齒九通存日赤暉紫芒乃長引吸而咽之存入所患之藏府若非藏府之疾是諸肢體筋骨者亦宜先存入所主之藏也閉極又引凡得九咽覺其藏中有氣乃存其氣攻於所苦之處閉極微微吐氣其息稍定更吸而攻之覺疾處溫暖汗出為佳若在四肢應可導引者則先導其處已後攻之縱上體上亦宜按捻令其氣通若在頭中當散髮梳頭皮數百下左右搖頭數十過乃吸氣訖以兩手指於頂上急攀之以頭向上力拒之仍存氣向上入腦於頂髮諸孔衝出散去一極訖放手通氣更為之以覺頭頸汗出痛處寬暢為候若病在藏府者則仰卧吸引存入其處得五六咽則一度閉息攻之皆以意消息其病或是久來痼疾並有癥塊痃積者則非氣之所能除愈終亦稍覺寬平也兼藥同療亦無所妨乃於藥性易效耳雖用氣攻病雖攻其處膚腠散出然兼依明堂圖取其所療之穴想而引去尤佳既知其穴宜依十三月各用其律管急按穴上想而出之則心存有所主氣行有所適矣黃鍾十一月律也管長九寸空中圍九分大吕十二月律也管長八寸空中圍九分大簇正月律也管長七寸强空中圍九分夾鍾二月律也管長七寸强空中圍九分姑洗三月律也管長七寸强空中圍九分仲吕四月律也管長六寸强空中圍九分蕤賔五月律也管長六寸强空中圍九分林鍾六月律也管長六寸强空中圍九分夷則七月律也管長五寸强空中圍九分南吕八月律也管長五寸强空中圍九分無射九月律也管長四寸强空中圍九分應鍾十月律也管長四寸强空中圍九分皆取山陽之竹孔圓者其節生枝不堪用手臂不援雖云手臂諸有疾處亦可為之先以一手徐徐按摩所疾之處良久畢乃臨目內視視見五藏咽液三過叩齒三通正心微咒曰太上四玄五華六庭三魂七魄天闕地精神符榮衛天胎上明四肢百神九節萬靈受籙玉晨刊書玉城玉童護命玉女侍身永齊二景飛仙上清長與日月年俱後傾超騰升仙得整太平流風結疴注鬼五飛魍魎冢訟二氣相徊凌我四肢干我盛衰泰山天丁龍虎曜威斬鬼不祥風邪即摧考注匿訟百毒隱非使我復常日月同暉考注見犯北辰收摧干明上威畢又常以生氣時咽液二七過按體所痛處向王而咒曰左玄右玄二神合真左黃右黃六華相當風氣惡疾伏匿四方玉液流澤上下宣通內遣水火外辟不祥長生飛仙身常休强畢又咽液二七過又當急按所痛處三十一過常如此則無疾也病候論天生之為命也資乎形神氣之所和也本乎藏府形神貞固則生全而享壽藏府清休則氣泰而無病然且禀精結胎之初各因四時之異誕形立性之本罕備五常之節故躁擾多端嗜欲增結或積疴於受生之始或致疾於役身之時是故喜怒憂恐自內而成疾也寒暑飲食自外而成病也强壯之歲唯知犯觸衰謝之年又乖修養陰陽互舛形氣相違諸疹既生厥候多狀况乎服氣之者穀肴己竭形體漸羸精氣未全神魄不暢或舊疹因之以發動新犯致之以虛邪須知所由宜詳所療今粗其可辨之狀以代問醫則其氣攻之術希同物藥虛實之形其何以生自氣血以並陰陽相傾氣亂於衛血流於經血氣離居一實一虛血並於陰氣並於陽故為驚狂血並於陽氣並於陰乃為炅中血並於上氣並於下心煩惋善怒血並於下氣並於上亂而善忘陽虛則外寒陰虛則內熱陽盛則內寒陰盛則外熱五藏之道皆出於經遂行血氣血氣不和百病乃變化血而生氣有餘則腹脹飱泄不時天之邪氣感則害五藏也水穀之寒溫感則害六府也地之濕氣感則害皮肉筋脉也又邪之主也或生於陰或生於陽生於陽者得之風雨寒暑生於陰者得之飲食居處陰陽喜怒陽者天氣也主外陰者地氣也主內陽道實陰道虛故犯賊風虛邪者陽受之食飲不可不節起居不時者陰受之陽受之則入六府陰受之則入五藏入六府則身熱不時卧上為喘呼入五藏則填滿閉塞下為飱泄久為腸癖故喉主天氣咽主地氣故陽受風氣陰受濕氣故陰氣從足上行至頭而下行循臂至指端陽氣從手上行至頭而下行至足故曰陽病者上行極而下行陰病者下行極而上行傷於風者上先受之傷於濕者下先受之頭者精明之府也頭憊視深精將奪矣背者胸之府也背曲肩隨胸將壞矣腰者腎之府也轉搖不能腎將憊矣膝者筋之府也屈伸不能行則僂附筋將憊矣骨者髓之府也不能久立行則掉栗骨將憊矣肺熱病者右頰赤心熱病者顔先赤肝熱病者左頰赤脾熱病者鼻赤腎熱病者頤赤病雖未發見其色者宜療之故曰療未病者病肺熱病者色白而毛槁心熱病者色赤而絡脉溢肝熱病者色蒼而爪枯脾熱病者色黃而肉蠕動腎熱病者色黑而齒枯肝主春足厥陰少陽主治其日甲乙肝苦急急食甘以緩之又曰肝病欲散急食辛以散之用辛補之酸瀉之禁當風肝惡風也心主夏手少陰太陽主治其日丙丁心苦緩急食酸以收之又曰心病欲耎急食鹹以耎之用鹹補之甘瀉之禁溫衣熱食心惡熱也脾主長夏足太陰陽明主治其日戊己脾苦濕急食苦以燥之又曰脾病欲緩急食甘以緩之用甘補之苦瀉之禁溫食飽食濕地濡衣脾惡濕也肺主秋手太陰陽明主治其日庚辛肺苦氣上逆急食苦以泄之又曰肺病欲收急食酸以收之用酸補之辛瀉之禁寒衣飲食肺惡寒也腎主冬足少陰太陽主治其日壬癸腎苦燥急食辛以潤之開腠理致津液氣通也又曰腎病欲堅急食苦以堅之用苦補之鹹瀉之卒暖無熱食溫衣腎惡燥也辛走氣氣病無食辛苦走骨骨病無食苦甘走肉肉病無食甘鹹走血血病無食鹹酸走筋筋病無食酸是謂五禁勿多食也肺病者喘咳逆氣肩背痛汗出尻陰股膝腨胻足背痛虛則少氣不能服事耳聾嗌乾心病者胸中痛脅肢滿肋下痛膺背肩甲間痛兩臂內痛虛則胸腹太滿脅下與腰相引而痛肝病者兩脅下痛引小腹令人善怒虛則恐如人將捕之氣逆則頭痛耳聾頰腫脾病者身重善肌肉痿足不收行善契腳下痛虛則腹滿腸鳴溏泄食不化腎病者腹大脛腫喘咳身重寢汗出惡風虛則胸中痛也肺風之狀多汗惡風時咳短氣晝日則差暮則甚診在眉上其色白心風之狀多汗惡風焦絶善怒診在口其色赤肝風之狀多汗惡風善悲微蒼嗌乾善怒診在目下其色青脾風之狀多汗惡風身體怠墮四肢不欲動微黃不嗜食診在鼻上其色黃腎風之狀多汗惡風面疣然脊痛不能正立其色炲隱曲不利診在肌上其色黑胃風之狀頸多汗惡風食飲不下隔塞不通腹善滿失衣則脹食寒則泄診在形瘦而腹大首風之狀頭面多汗惡風先當風一日則病甚頭痛不可以出再至其風日則病小愈矣修真精義雜論
